<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0A0A0A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>GymRui Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--orange:#FF4500;--green:#00FF88;--bg:#0A0A0A;--surface:#141414;--surface2:#1A1A1A;--border:#262626;--text:#FFF;--muted:#888;--dim:#444;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden;}
#app{width:100%;max-width:480px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;}
.view{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;}
.view::-webkit-scrollbar{display:none;}
/* TOPBAR */
.topbar{padding:52px 18px 16px;background:var(--bg);position:sticky;top:0;z-index:5;border-bottom:1px solid var(--border);}
.topbar-back{background:none;border:none;color:var(--accent,var(--orange));font-size:14px;cursor:pointer;padding:0 0 8px;font-family:'Barlow',sans-serif;}
.topbar h1{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;text-transform:uppercase;line-height:1;}
.topbar h2{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;text-transform:uppercase;}
.title-red{color:var(--orange);}
.greeting{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.home-header{display:flex;justify-content:space-between;align-items:flex-start;}
.streak-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:11px;color:var(--muted);text-align:right;line-height:1.5;max-width:150px;}
.streak-box strong{color:var(--text);font-size:12px;display:block;}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:3px;color:var(--dim);padding:24px 18px 8px;}
/* GROUP CARDS */
.group-row{display:flex;align-items:stretch;margin:0 10px 8px;}
.group-card{display:flex;align-items:center;gap:14px;background:var(--surface);border:none;border-left:4px solid var(--c,var(--orange));cursor:pointer;flex:1;text-align:left;color:var(--text);padding:18px 16px;border-radius:14px 0 0 14px;transition:transform .15s;}
.group-card:active{transform:scale(0.97);}
.group-icon{font-size:26px;width:44px;text-align:center;}
.group-info{flex:1;}
.group-name{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;text-transform:uppercase;}
.group-count{font-size:12px;color:var(--muted);margin-top:2px;}
.group-arrow{font-size:22px;color:var(--c,var(--orange));font-weight:900;}
.group-actions{display:flex;flex-direction:column;}
.group-btn{background:var(--surface);border:none;border-left:1px solid var(--border);color:var(--muted);font-size:16px;cursor:pointer;padding:0 13px;flex:1;display:flex;align-items:center;justify-content:center;}
.group-btn:first-child{border-bottom:1px solid var(--border);border-radius:0 14px 0 0;}
.group-btn:last-child{border-radius:0 0 14px 0;}
.recent-card{margin:0 10px;background:var(--surface);border-left:4px solid var(--c,#888);border-radius:14px;padding:14px 16px;}
.recent-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.recent-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;}
.recent-date{font-size:11px;color:var(--muted);}
.recent-stats{display:flex;gap:14px;font-size:13px;color:var(--muted);}
/* EXERCISE LIST IN GROUP */
.ex-list{padding:8px 10px 100px;}
.ex-card{background:var(--surface);border-radius:14px;margin-bottom:10px;border-left:3px solid var(--c,var(--orange));overflow:hidden;position:relative;}
.ex-card.completed-today{opacity:.55;}
.ex-done-badge{position:absolute;top:10px;right:10px;background:#0F2A1A;color:var(--green);border-radius:20px;font-size:11px;font-weight:600;padding:4px 10px;z-index:2;}
.ex-img-wrap{width:100%;height:150px;background:var(--surface2);cursor:pointer;overflow:hidden;position:relative;}
.ex-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.ex-img-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--dim);font-size:12px;}
.ex-img-placeholder span{font-size:28px;}
.ex-img-overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:.2s;}
.ex-img-wrap:active .ex-img-overlay{opacity:1;}
.ex-img-overlay-txt{color:#fff;font-size:12px;font-weight:600;background:rgba(0,0,0,.5);padding:5px 12px;border-radius:20px;}
.ex-info{padding:12px 14px 8px;}
.ex-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;}
.ex-detail{font-size:12px;color:var(--muted);margin-top:2px;}
.ex-footer{display:flex;gap:6px;padding:0 12px 12px;}
.btn-do{flex:1;background:var(--c,var(--orange));color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:transform .1s;}
.btn-do:active{transform:scale(0.97);}
.btn-do.done-btn{background:#0F2A1A;color:var(--green);border:1px solid var(--green)33;}
.btn-sm{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 12px;color:var(--muted);font-size:14px;cursor:pointer;}
/* SESSION HEADER */
.session-strip{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;}
.session-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.session-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;flex:1;}
.session-count{font-size:12px;color:var(--green);}
/* EXERCISE SESSION VIEW */
.ex-session{padding:12px 10px 120px;}
.ex-session-img{width:100%;height:220px;object-fit:cover;border-radius:14px;display:block;margin-bottom:12px;}
.ex-session-card{background:var(--surface);border-radius:14px;padding:20px;margin-bottom:12px;}
.ex-session-muscle{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.ex-session-name{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;text-transform:uppercase;line-height:1.1;margin-bottom:6px;}
.ex-session-detail{font-size:15px;color:var(--muted);}
.ex-session-note{font-size:13px;color:var(--dim);margin-top:4px;}
.sets-visual{display:flex;gap:10px;padding:20px;background:var(--surface);border-radius:14px;margin-bottom:12px;align-items:center;flex-wrap:wrap;}
.set-circle{width:48px;height:48px;border-radius:50%;border:3px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--dim);transition:all .3s;flex-shrink:0;}
.set-circle.done{border-color:var(--c,var(--orange));color:var(--c,var(--orange));background:rgba(255,69,0,.1);}
.set-circle.current{border-color:var(--c,var(--orange));color:#fff;background:var(--c,var(--orange));animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.sets-label{font-size:14px;color:var(--muted);margin-left:4px;}
/* COMPLETION SCREEN */
.completion{padding:20px 16px 120px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.completion-icon{font-size:80px;margin:20px 0 16px;animation:pop .5s cubic-bezier(.175,.885,.32,1.275);}
@keyframes pop{0%{transform:scale(0);}100%{transform:scale(1);}}
.completion-title{font-family:'Barlow Condensed',sans-serif;font-size:42px;font-weight:900;text-transform:uppercase;color:var(--green);margin-bottom:8px;}
.completion-sub{font-size:16px;color:var(--muted);margin-bottom:32px;}
.completion-stats{display:flex;gap:12px;margin-bottom:32px;}
.cstat{background:var(--surface);border-radius:12px;padding:16px 20px;text-align:center;}
.cstat-val{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--text);}
.cstat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
/* BOTTOM ACTION BAR */
.action-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:10px 12px 12px;background:var(--bg);border-top:1px solid var(--border);z-index:15;}
.btn-main{width:100%;background:var(--c,var(--orange));color:#fff;border:none;border-radius:14px;padding:18px;font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:transform .15s;display:block;margin-bottom:8px;}
.btn-main:active{transform:scale(0.97);}
.btn-main.green{background:var(--green);color:#000;}
.btn-main.ghost{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:16px;padding:13px;margin-bottom:0;}
/* TIMER */
.timer-bar{position:fixed;bottom:130px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:2px solid var(--c,var(--orange));padding:10px 16px;z-index:20;display:flex;align-items:center;gap:10px;}
.timer-bar.hidden{display:none;}
.timer-label{font-size:12px;color:var(--muted);flex-shrink:0;}
.timer-val{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;flex:1;text-align:center;}
.timer-val.urgent{color:#FF2200;animation:blink .5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.timer-btns{display:flex;gap:6px;}
.btn-timer{background:var(--surface2);border:1px solid var(--border);color:#ccc;border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;}
/* FORMS */
.add-tabs{display:flex;padding:16px 10px 0;gap:8px;}
.add-tab{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 10px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s;}
.add-tab.active{background:var(--surface2);border-color:var(--green);color:var(--green);}
.form-body{padding:16px 16px 100px;}
.form-group{margin-bottom:16px;}
.form-row{display:flex;gap:12px;}
.form-row .form-group{flex:1;}
.form-label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:16px;font-family:'Barlow',sans-serif;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--green);}
select.form-input option{background:#141414;}
.btn-add{width:100%;background:var(--green);color:#000;border:none;border-radius:14px;padding:18px;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;margin-top:8px;}
.btn-add.orange{background:var(--orange);color:#fff;}
.btn-add.blue{background:#0088CC;color:#fff;}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:6px;}
.emoji-opt{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:10px 0;font-size:22px;cursor:pointer;text-align:center;transition:all .2s;}
.emoji-opt.selected{border-color:var(--green);}
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:6px;}
.color-opt{height:40px;border-radius:10px;border:3px solid transparent;cursor:pointer;transition:all .2s;}
.color-opt.selected{border-color:#fff;transform:scale(1.05);}
/* HISTORY */
.history-list{padding:8px 10px;}
.hist-card{background:var(--surface);border-left:4px solid var(--c,#888);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.hist-top{display:flex;justify-content:space-between;margin-bottom:7px;}
.hist-group{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;}
.hist-date{font-size:11px;color:var(--muted);text-align:right;max-width:130px;}
.hist-stats{display:flex;gap:14px;font-size:13px;color:var(--muted);margin-bottom:8px;}
.hist-tags{display:flex;flex-wrap:wrap;gap:5px;}
.hist-tag{background:var(--surface2);color:var(--muted);font-size:11px;padding:3px 8px;border-radius:6px;}
.empty{text-align:center;padding:80px 20px;color:var(--dim);}
.empty-ico{font-size:48px;margin-bottom:16px;}
.empty p{font-size:16px;line-height:1.6;}
.hint{font-size:12px;color:var(--dim);padding:0 0 8px;line-height:1.5;}
/* NAV */
.bottom-nav{display:flex;background:#0D0D0D;border-top:1px solid var(--border);flex-shrink:0;}
.nav-btn{flex:1;background:none;border:none;color:var(--dim);padding:10px 0 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-family:'Barlow',sans-serif;text-transform:uppercase;letter-spacing:.5px;}
.nav-btn.active{color:var(--orange);}
.nav-ico{font-size:21px;}
.nav-plus{width:32px;height:32px;background:var(--orange);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:300;line-height:1;}
.nav-btn.active .nav-plus{background:#FF6633;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:12px;font-size:14px;z-index:100;white-space:nowrap;opacity:0;transition:all .3s;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
input[type=file]{display:none;}
</style>
</head>
<body>
<div id="app">
  <div id="view" class="view"></div>
  <div id="nav" class="bottom-nav">
    <button class="nav-btn active" id="nb-home" onclick="goHome()"><span class="nav-ico">🏠</span><span>Início</span></button>
    <button class="nav-btn" id="nb-add" onclick="goAdd('exercise')"><div class="nav-plus">+</div><span>Adicionar</span></button>
    <button class="nav-btn" id="nb-hist" onclick="goHist()"><span class="nav-ico">📋</span><span>Histórico</span></button>
  </div>
  <div class="toast" id="toast"></div>
  <input type="file" id="img-input" accept="image/*"/>
</div>
<script>
const DEFAULT_GROUPS=[
  {id:'peito-bicep',name:'Peito e Bícep',icon:'💪',color:'#FF4500',exercises:[
    {id:'supino-inclinado',name:'Supino Inclinado',sets:3,reps:12,muscle:'Peito',notes:'Banco a 45°',img:''},
    {id:'cruse-fixo',name:'Cruse Fixo',sets:3,reps:15,muscle:'Peito',notes:'',img:''},
    {id:'bicep-maquina',name:'Bícep na Máquina',sets:3,reps:12,muscle:'Bícep',notes:'',img:''},
    {id:'bicep-banco',name:'Bícep Banco Inclinado',sets:3,reps:12,muscle:'Bícep',notes:'',img:''},
    {id:'martelo',name:'Martelo c/ Alteres',sets:3,reps:12,muscle:'Bícep',notes:'Alternado',img:''},
  ]},
  {id:'costas-tricep',name:'Costas e Trícep',icon:'🏋️',color:'#00BFFF',exercises:[
    {id:'remada',name:'Remada na Máquina',sets:3,reps:12,muscle:'Costas',notes:'',img:''},
    {id:'push-costas',name:'Push de Costas (Máquina)',sets:3,reps:12,muscle:'Costas',notes:'',img:''},
    {id:'tricep-frances',name:'Trícep Francês',sets:3,reps:12,muscle:'Trícep',notes:'',img:''},
    {id:'tricep-maquina',name:'Trícep na Máquina',sets:3,reps:12,muscle:'Trícep',notes:'',img:''},
    {id:'tricep-polia',name:'Trícep na Polia (Barra V)',sets:3,reps:15,muscle:'Trícep',notes:'',img:''},
    {id:'afundos',name:'Afundos Trícep Máquina',sets:3,reps:12,muscle:'Trícep',notes:'',img:''},
  ]},
  {id:'ombro-perna',name:'Ombro e Perna',icon:'🦵',color:'#FFD700',exercises:[
    {id:'ombro-frontal',name:'Ombro Frontal c/ Halteres',sets:3,reps:12,muscle:'Ombro',notes:'',img:''},
    {id:'ombro-lateral',name:'Ombro Lateral c/ Halteres',sets:3,reps:12,muscle:'Ombro',notes:'',img:''},
    {id:'press-ombros',name:'Press Máquina (Ombros)',sets:3,reps:12,muscle:'Ombro',notes:'',img:''},
    {id:'elevacoes',name:'Elevações na Máquina',sets:3,reps:12,muscle:'Ombro',notes:'',img:''},
    {id:'cadeira-ext',name:'Cadeira Extensora',sets:3,reps:15,muscle:'Perna',notes:'',img:''},
    {id:'cadeira-abd',name:'Cadeira Abdutora',sets:3,reps:15,muscle:'Perna',notes:'',img:''},
    {id:'aducao',name:'Adução do Quadril',sets:3,reps:15,muscle:'Perna',notes:'',img:''},
    {id:'gemeos',name:'Gémeos na Máquina',sets:3,reps:15,muscle:'Perna',notes:'',img:''},
    {id:'bicicleta',name:'Bicicleta Ergométrica',sets:1,reps:20,muscle:'Cardio',notes:'20 min',img:''},
    {id:'abdominais',name:'Abdominais',sets:3,reps:20,muscle:'Abdómen',notes:'',img:''},
    {id:'passadeira',name:'Passadeira',sets:1,reps:1,muscle:'Cardio',notes:'15 min',img:''},
  ]},
];
const MUSCLES=['Peito','Costas','Bícep','Trícep','Ombro','Perna','Abdómen','Cardio','Glúteo','Outro'];
const EMOJIS=['🦵','💪','🏋️','🔥','⚡','🎯','🏃','🤸','🧘','🥊','🏆','💥','🦾','🫀','🎽'];
const COLORS=['#FF4500','#00BFFF','#FFD700','#00FF88','#FF69B4','#9B59B6','#FF6B35','#26DE81','#4ECDC4','#FF3366'];

let groups=JSON.parse(localStorage.getItem('gymrui-groups')||'null')||DEFAULT_GROUPS;
let history=JSON.parse(localStorage.getItem('gymrui-history')||'[]');

// SESSION: tracks the current training session
let session=null; // {groupId, groupName, groupColor, startTime, doneIds:[]}
let curEx=null;   // {exercise, setsCompleted}
let timer={id:null,secs:90,running:false,visible:false};
let addMode='exercise';
let selEmoji=EMOJIS[0],selColor=COLORS[3];
let editingGid=null,editingEid=null;
let pendingImgCb=null;

function save(){localStorage.setItem('gymrui-groups',JSON.stringify(groups));}
function saveHist(){localStorage.setItem('gymrui-history',JSON.stringify(history));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function setNav(v){['home','add','hist'].forEach(n=>document.getElementById('nb-'+n).classList.toggle('active',n===v));}
function showNav(){document.getElementById('nav').style.display='flex';}
function hideNav(){document.getElementById('nav').style.display='none';}
function goHome(){stopTimer();session=null;curEx=null;setNav('home');showNav();renderHome();}
function goAdd(m){addMode=m||'exercise';selEmoji=EMOJIS[0];selColor=COLORS[3];setNav('add');showNav();renderAdd();}
function goHist(){setNav('hist');showNav();renderHist();}
function goGroup(id){showNav();renderGroup(id);}

/* IMAGE */
document.getElementById('img-input').addEventListener('change',function(){
  const file=this.files[0];if(!file||!pendingImgCb)return;this.value='';
  const reader=new FileReader();
  reader.onload=e=>{const img=new Image();img.onload=()=>{
    const MAX=600,r=Math.min(MAX/img.width,MAX/img.height,1);
    const c=document.createElement('canvas');c.width=Math.round(img.width*r);c.height=Math.round(img.height*r);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);
    pendingImgCb(c.toDataURL('image/jpeg',.75));pendingImgCb=null;
  };img.src=e.target.result;};
  reader.readAsDataURL(file);
});
function pickImage(cb){pendingImgCb=cb;document.getElementById('img-input').click();}
function setExImage(gid,eid){
  pickImage(data=>{
    groups=groups.map(g=>g.id===gid?{...g,exercises:g.exercises.map(e=>e.id===eid?{...e,img:data}:e)}:g);
    save();showToast('📷 Imagem guardada!');renderGroup(gid);
  });
}
function removeExImage(gid,eid){
  groups=groups.map(g=>g.id===gid?{...g,exercises:g.exercises.map(e=>e.id===eid?{...e,img:''}:e)}:g);
  save();showToast('🗑️ Imagem removida');renderGroup(gid);
}

/* ── HOME ── */
function renderHome(){
  const last=history[0];
  document.getElementById('view').innerHTML=`
    <div class="topbar">
      <div class="home-header">
        <div><p class="greeting">Bem-vindo,</p><h1>GymRui <span class="title-red">Pro</span></h1></div>
        ${last?`<div class="streak-box">🔥 Último:<br/><strong>${last.groupName}</strong><span style="font-size:10px;color:var(--dim)">${last.date}</span></div>`:''}
      </div>
    </div>
    <p class="section-label">Os Teus Treinos</p>
    ${groups.map(g=>`
      <div class="group-row">
        <button class="group-card" style="--c:${g.color}" onclick="goGroup('${g.id}')">
          <span class="group-icon">${g.icon}</span>
          <div class="group-info"><div class="group-name">${g.name}</div><div class="group-count">${g.exercises.length} exercícios</div></div>
          <span class="group-arrow">›</span>
        </button>
        <div class="group-actions">
          <button class="group-btn" onclick="goEditGroup('${g.id}')">✏️</button>
          <button class="group-btn" onclick="delGroup('${g.id}')">🗑</button>
        </div>
      </div>`).join('')}
    <div style="padding:0 10px 8px">
      <button onclick="goAdd('group')" style="width:100%;background:transparent;border:2px dashed var(--border);border-radius:14px;padding:16px;color:var(--dim);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
        <span style="font-size:22px">+</span> Criar Novo Grupo
      </button>
    </div>
    ${last?`<p class="section-label">Treino Recente</p>
    <div class="recent-card" style="--c:${last.groupColor||'#888'}">
      <div class="recent-row"><span class="recent-name">${last.groupName}</span><span class="recent-date">${last.date}</span></div>
      <div class="recent-stats"><span>⏱ ${last.duration} min</span><span>✅ ${last.done}/${last.total}</span></div>
    </div>`:''}
    <div style="height:16px"></div>`;
}
function delGroup(id){
  const g=groups.find(x=>x.id===id);
  if(!confirm(`Apagar "${g.name}"?\nOs exercícios também serão apagados.`))return;
  groups=groups.filter(x=>x.id!==id);save();showToast('🗑️ Grupo apagado');renderHome();
}

/* ── GROUP VIEW ── */
function renderGroup(id){
  const g=groups.find(x=>x.id===id);
  const inSession=session&&session.groupId===id;
  document.getElementById('view').innerHTML=`
    <div class="topbar" style="--accent:${g.color}">
      <button class="topbar-back" onclick="goHome()">← Voltar</button>
      <h2>${g.icon} ${g.name}</h2>
    </div>
    ${inSession?`<div class="session-strip">
      <div>
        <div class="session-label">Sessão em curso</div>
        <div class="session-name">${g.name}</div>
      </div>
      <span class="session-count">✅ ${session.doneIds.length} feitos</span>
      <button onclick="finishSession()" style="background:#0F2A1A;border:1px solid var(--green)33;color:var(--green);border-radius:8px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:'Barlow',sans-serif;">Terminar</button>
    </div>`:''}
    ${g.exercises.length===0?`<div class="empty"><div class="empty-ico">🏋️</div><p>Ainda não tens exercícios.<br/>Usa o "+" para adicionar!</p></div>`:''}
    <div class="ex-list">
      ${g.exercises.map(ex=>{
        const isDone=inSession&&session.doneIds.includes(ex.id);
        return `<div class="ex-card${isDone?' completed-today':''}" style="--c:${g.color}">
          ${isDone?`<div class="ex-done-badge">✓ Concluído</div>`:''}
          <div class="ex-img-wrap" onclick="setExImage('${g.id}','${ex.id}')">
            ${ex.img?`<img src="${ex.img}" alt="${ex.name}"/><div class="ex-img-overlay"><span class="ex-img-overlay-txt">📷 Alterar</span></div>`
            :`<div class="ex-img-placeholder"><span>📷</span><span>Adicionar foto</span></div>`}
          </div>
          <div class="ex-info">
            <span class="ex-tag" style="background:${g.color}22;color:${g.color}">${ex.muscle}</span>
            <div class="ex-name">${ex.name}</div>
            <div class="ex-detail">${ex.sets} séries × ${ex.reps} reps${ex.notes?' · '+ex.notes:''}</div>
          </div>
          <div class="ex-footer">
            <button class="btn-do${isDone?' done-btn':''}" style="--c:${g.color}" onclick="startExercise('${g.id}','${ex.id}')">
              ${isDone?'✓ Repetir':'▶ Fazer este exercício'}
            </button>
            <button class="btn-sm" onclick="goEditEx('${g.id}','${ex.id}')">✏️</button>
            <button class="btn-sm" onclick="delEx('${g.id}','${ex.id}')" style="color:#FF4444">🗑</button>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

/* ── START A SINGLE EXERCISE ── */
function startExercise(gid,eid){
  const g=groups.find(x=>x.id===gid);
  const ex=g.exercises.find(x=>x.id===eid);
  // Start session if not started
  if(!session){session={groupId:gid,groupName:g.name,groupColor:g.color,startTime:Date.now(),doneIds:[]};}
  curEx={exercise:ex,groupColor:g.color,groupId:gid,setsCompleted:0};
  stopTimer();hideNav();renderExSession();
}

function renderExSession(){
  const {exercise:ex,groupColor,setsCompleted}=curEx;
  const allDone=setsCompleted>=ex.sets;
  document.getElementById('view').innerHTML=`
    <div class="topbar" style="--accent:${groupColor}">
      <button class="topbar-back" onclick="backToGroup()">← Voltar ao grupo</button>
      <h2>${ex.name}</h2>
    </div>
    <div class="ex-session">
      ${ex.img?`<img class="ex-session-img" src="${ex.img}" alt="${ex.name}"/>`:''}
      <div class="ex-session-card">
        <div class="ex-session-muscle">${ex.muscle}</div>
        <div class="ex-session-name">${ex.name}</div>
        <div class="ex-session-detail">${ex.sets} séries × ${ex.reps} repetições</div>
        ${ex.notes?`<div class="ex-session-note">📝 ${ex.notes}</div>`:''}
      </div>
      <div class="sets-visual" style="--c:${groupColor}">
        ${Array.from({length:ex.sets},(_,i)=>{
          const state=i<setsCompleted?'done':i===setsCompleted&&!allDone?'current':'';
          return `<div class="set-circle${state?' '+state:''}" style="--c:${groupColor}">${i+1}</div>`;
        }).join('')}
        <span class="sets-label">${setsCompleted}/${ex.sets} séries</span>
      </div>
    </div>
    <div class="timer-bar${timer.visible?'':' hidden'}" id="timer-bar" style="--c:${groupColor}">
      <span class="timer-label">⏱ Descanso</span>
      <span class="timer-val${timer.secs<=10?' urgent':''}" id="timer-display">${fmtTime(timer.secs)}</span>
      <div class="timer-btns">
        <button class="btn-timer" onclick="addTimerTime()">+30s</button>
        <button class="btn-timer" onclick="skipTimer()">Skip</button>
      </div>
    </div>
    <div class="action-bar">
      ${!allDone
        ?`<button class="btn-main" style="--c:${groupColor}" onclick="completeSet()">+ Série ${setsCompleted+1} Concluída</button>
           <button class="btn-main ghost" onclick="backToGroup()">← Voltar ao grupo</button>`
        :''
      }
    </div>`;
  if(allDone) setTimeout(()=>showCompletion(),300);
}

function showCompletion(){
  const {exercise:ex,groupColor,groupId}=curEx;
  // Mark as done in session
  if(!session.doneIds.includes(ex.id)) session.doneIds.push(ex.id);
  document.getElementById('view').innerHTML=`
    <div class="topbar" style="--accent:${groupColor}">
      <button class="topbar-back" onclick="backToGroup()">← Voltar ao grupo</button>
      <h2>${ex.name}</h2>
    </div>
    <div class="completion">
      <div class="completion-icon">🏆</div>
      <div class="completion-title">Séries Concluídas!</div>
      <div class="completion-sub">${ex.name}</div>
      <div class="completion-stats">
        <div class="cstat"><div class="cstat-val">${ex.sets}</div><div class="cstat-label">Séries</div></div>
        <div class="cstat"><div class="cstat-val">${ex.reps}</div><div class="cstat-label">Reps</div></div>
        <div class="cstat"><div class="cstat-val">${session.doneIds.length}</div><div class="cstat-label">Feitos hoje</div></div>
      </div>
    </div>
    <div class="action-bar">
      <button class="btn-main green" onclick="backToGroup()">▶ Escolher próximo exercício</button>
      <button class="btn-main ghost" onclick="finishSession()">🏆 Terminar treino</button>
    </div>`;
}

function completeSet(){
  curEx.setsCompleted++;
  if(curEx.setsCompleted<curEx.exercise.sets){
    startTimer(90);
    renderExSession();
  } else {
    stopTimer();
    renderExSession();
  }
}

function backToGroup(){
  stopTimer();showNav();
  if(session) goGroup(session.groupId);
  else goHome();
}

function finishSession(){
  if(!session)return;
  if(session.doneIds.length===0){
    if(!confirm('Não completaste nenhum exercício. Terminar mesmo assim?'))return;
  }
  const dur=Math.round((Date.now()-session.startTime)/60000);
  const g=groups.find(x=>x.id===session.groupId);
  history.unshift({id:Date.now(),
    date:new Date().toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short'}),
    groupName:session.groupName,groupColor:session.groupColor,duration:dur,
    total:g?g.exercises.length:0,done:session.doneIds.length,
    exercises:session.doneIds.map(id=>{const ex=g?.exercises.find(e=>e.id===id);return ex?ex.name:id;})
  });
  if(history.length>100)history=history.slice(0,100);
  saveHist();
  session=null;curEx=null;showNav();
  showToast('🏆 Treino guardado!');goHome();
}

/* TIMER */
function fmtTime(s){return Math.floor(s/60)+':'+(s%60+'').padStart(2,'0');}
function startTimer(secs){
  stopTimer();
  timer={id:null,secs,running:true,visible:true};
  timer.id=setInterval(()=>{
    timer.secs--;
    if(timer.secs<=0){stopTimer();showToast('⏰ Descanso terminado! Pronto para a próxima série.');}
    else updateTimerDisplay();
  },1000);
  updateTimerDisplay();
}
function stopTimer(){if(timer.id)clearInterval(timer.id);timer={id:null,secs:90,running:false,visible:false};}
function updateTimerDisplay(){
  const el=document.getElementById('timer-display');if(!el)return;
  el.textContent=fmtTime(timer.secs);el.className='timer-val'+(timer.secs<=10?' urgent':'');
  const bar=document.getElementById('timer-bar');if(bar)bar.classList.toggle('hidden',!timer.visible);
}
function addTimerTime(){timer.secs+=30;updateTimerDisplay();}
function skipTimer(){stopTimer();updateTimerDisplay();}

/* EDIT GROUP */
function goEditGroup(id){
  const g=groups.find(x=>x.id===id);editingGid=id;selEmoji=g.icon;selColor=g.color;showNav();
  document.getElementById('view').innerHTML=`
    <div class="topbar" style="--accent:#0088CC">
      <button class="topbar-back" onclick="goHome()">← Voltar</button><h2>✏️ Editar Grupo</h2>
    </div>
    <div class="form-body">
      <div class="form-group"><label class="form-label">Nome</label><input id="g-name" class="form-input" value="${g.name}"/></div>
      <div class="form-group"><label class="form-label">Ícone</label>
        <div class="emoji-grid">${EMOJIS.map(e=>`<button class="emoji-opt${e===selEmoji?' selected':''}" onclick="pickEmoji(this,'${e}')">${e}</button>`).join('')}</div></div>
      <div class="form-group"><label class="form-label">Cor</label>
        <div class="color-grid">${COLORS.map(c=>`<div class="color-opt${c===selColor?' selected':''}" style="background:${c}" onclick="pickColor(this,'${c}')"></div>`).join('')}</div></div>
      <button class="btn-add blue" onclick="submitEditGroup()">Guardar Alterações</button>
    </div>`;
}
function submitEditGroup(){
  const name=document.getElementById('g-name').value.trim();
  if(!name){showToast('⚠️ Escreve o nome');return;}
  groups=groups.map(g=>g.id===editingGid?{...g,name,icon:selEmoji,color:selColor}:g);
  save();showToast('✅ Grupo atualizado!');goHome();
}

/* EDIT EXERCISE */
function goEditEx(gid,eid){
  const g=groups.find(x=>x.id===gid),ex=g.exercises.find(x=>x.id===eid);
  editingGid=gid;editingEid=eid;showNav();
  document.getElementById('view').innerHTML=`
    <div class="topbar" style="--accent:${g.color}">
      <button class="topbar-back" onclick="goGroup('${gid}')">← Voltar</button><h2>✏️ Editar Exercício</h2>
    </div>
    <div class="form-body">
      <div class="form-group"><label class="form-label">Nome</label><input id="e-name" class="form-input" value="${ex.name}"/></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Séries</label><input id="e-sets" class="form-input" type="number" min="1" max="20" value="${ex.sets}"/></div>
        <div class="form-group"><label class="form-label">Reps</label><input id="e-reps" class="form-input" type="number" min="1" max="200" value="${ex.reps}"/></div>
      </div>
      <div class="form-group"><label class="form-label">Músculo</label>
        <select id="e-muscle" class="form-input">${MUSCLES.map(m=>`<option${m===ex.muscle?' selected':''}>${m}</option>`).join('')}</select></div>
      <div class="form-group"><label class="form-label">Notas</label><input id="e-notes" class="form-input" value="${ex.notes||''}"/></div>
      <div class="form-group">
        <label class="form-label">Foto do exercício</label>
        <div style="display:flex;gap:8px;">
          <button class="btn-add blue" style="margin:0;flex:1;padding:14px;font-size:16px" onclick="setExImage('${gid}','${eid}')">📷 ${ex.img?'Alterar foto':'Adicionar foto'}</button>
          ${ex.img?`<button onclick="removeExImage('${gid}','${eid}')" style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;color:#FF4444;cursor:pointer;font-size:16px">🗑</button>`:''}
        </div>
      </div>
      <button class="btn-add blue" onclick="submitEditEx()">Guardar Alterações</button>
    </div>`;
}
function submitEditEx(){
  const name=document.getElementById('e-name').value.trim();
  if(!name){showToast('⚠️ Escreve o nome');return;}
  groups=groups.map(g=>g.id===editingGid?{...g,exercises:g.exercises.map(e=>e.id===editingEid?{...e,name,
    sets:parseInt(document.getElementById('e-sets').value)||3,
    reps:parseInt(document.getElementById('e-reps').value)||12,
    muscle:document.getElementById('e-muscle').value,
    notes:document.getElementById('e-notes').value.trim()}:e)}:g);
  save();showToast('✅ Exercício atualizado!');goGroup(editingGid);
}
function delEx(gid,eid){
  if(!confirm('Apagar este exercício?'))return;
  groups=groups.map(g=>g.id===gid?{...g,exercises:g.exercises.filter(e=>e.id!==eid)}:g);
  save();showToast('🗑️ Exercício apagado');renderGroup(gid);
}

/* ADD */
function renderAdd(){
  document.getElementById('view').innerHTML=`
    <div class="topbar" style="--accent:var(--green)">
      <h2>➕ ${addMode==='group'?'Novo Grupo':'Novo Exercício'}</h2>
    </div>
    <div class="add-tabs">
      <button class="add-tab ${addMode==='exercise'?'active':''}" onclick="switchAddMode('exercise')">💪 Exercício</button>
      <button class="add-tab ${addMode==='group'?'active':''}" onclick="switchAddMode('group')">📁 Grupo</button>
    </div>
    <div class="form-body">${addMode==='exercise'?renderExForm():renderGroupForm()}</div>`;
}
function switchAddMode(m){addMode=m;renderAdd();}
function renderExForm(){return `
  <p class="hint">Adiciona um exercício a qualquer grupo.</p>
  <div class="form-group"><label class="form-label">Nome *</label><input id="f-name" class="form-input" placeholder="ex: Agachamento com Barra"/></div>
  <div class="form-group"><label class="form-label">Grupo</label>
    <select id="f-group" class="form-input">${groups.map(g=>`<option value="${g.id}">${g.icon} ${g.name}</option>`).join('')}</select></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Séries</label><input id="f-sets" class="form-input" type="number" min="1" max="20" value="3"/></div>
    <div class="form-group"><label class="form-label">Reps</label><input id="f-reps" class="form-input" type="number" min="1" max="200" value="12"/></div>
  </div>
  <div class="form-group"><label class="form-label">Músculo</label>
    <select id="f-muscle" class="form-input">${MUSCLES.map(m=>`<option>${m}</option>`).join('')}</select></div>
  <div class="form-group"><label class="form-label">Notas (opcional)</label><input id="f-notes" class="form-input" placeholder="ex: Uni-articular..."/></div>
  <button class="btn-add" onclick="submitEx()">Adicionar Exercício</button>`;}
function renderGroupForm(){return `
  <p class="hint">Cria um grupo de treino novo.</p>
  <div class="form-group"><label class="form-label">Nome *</label><input id="g-name" class="form-input" placeholder="ex: Treino de Pernas"/></div>
  <div class="form-group"><label class="form-label">Ícone</label>
    <div class="emoji-grid">${EMOJIS.map(e=>`<button class="emoji-opt${e===selEmoji?' selected':''}" onclick="pickEmoji(this,'${e}')">${e}</button>`).join('')}</div></div>
  <div class="form-group"><label class="form-label">Cor</label>
    <div class="color-grid">${COLORS.map(c=>`<div class="color-opt${c===selColor?' selected':''}" style="background:${c}" onclick="pickColor(this,'${c}')"></div>`).join('')}</div></div>
  <button class="btn-add orange" onclick="submitGroup()">Criar Grupo</button>`;}
function pickEmoji(el,e){selEmoji=e;document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');}
function pickColor(el,c){selColor=c;document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');}
function submitEx(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){showToast('⚠️ Escreve o nome');return;}
  const gid=document.getElementById('f-group').value;
  const newEx={id:'ex-'+Date.now(),name,sets:parseInt(document.getElementById('f-sets').value)||3,
    reps:parseInt(document.getElementById('f-reps').value)||12,
    muscle:document.getElementById('f-muscle').value,
    notes:document.getElementById('f-notes').value.trim(),img:''};
  groups=groups.map(g=>g.id===gid?{...g,exercises:[...g.exercises,newEx]}:g);
  save();showToast('✅ Exercício adicionado!');goHome();
}
function submitGroup(){
  const name=document.getElementById('g-name').value.trim();
  if(!name){showToast('⚠️ Escreve o nome');return;}
  const ng={id:'g-'+Date.now(),name,icon:selEmoji,color:selColor,exercises:[]};
  groups=[...groups,ng];save();showToast('✅ Grupo criado!');goGroup(ng.id);
}

/* HISTORY */
function renderHist(){
  document.getElementById('view').innerHTML=`
    <div class="topbar" style="--accent:#888"><h2>📋 Histórico de Treinos</h2></div>
    ${history.length===0?`<div class="empty"><div class="empty-ico">🏋️</div><p>Ainda não fizeste nenhum treino.</p></div>`
    :`<div class="history-list">${history.map(h=>`
      <div class="hist-card" style="--c:${h.groupColor||'#888'}">
        <div class="hist-top"><span class="hist-group">${h.groupName}</span><span class="hist-date">${h.date}</span></div>
        <div class="hist-stats"><span>⏱ ${h.duration} min</span><span>✅ ${h.done}/${h.total}</span></div>
        ${h.exercises.length>0?`<div class="hist-tags">${h.exercises.slice(0,4).map(n=>`<span class="hist-tag">${n}</span>`).join('')}${h.exercises.length>4?`<span class="hist-tag">+${h.exercises.length-4}</span>`:''}</div>`:''}
      </div>`).join('')}</div>`}`;
}

goHome();
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(e=>console.log(e));
}
</script>
</body>
</html>
