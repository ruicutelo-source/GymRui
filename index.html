<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0A0A0A"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>GymRui Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --orange:#FF4500;--blue:#00BFFF;--gold:#FFD700;--green:#00FF88;
  --bg:#0A0A0A;--surface:#141414;--surface2:#1A1A1A;--border:#262626;
  --text:#FFFFFF;--muted:#888;--dim:#444;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;overflow:hidden;}
#app{width:100%;max-width:480px;height:100dvh;margin:0 auto;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.view{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;}
.view::-webkit-scrollbar{display:none;}

.topbar{padding:52px 18px 16px;background:var(--bg);position:sticky;top:0;z-index:5;border-bottom:1px solid var(--border);}
.topbar-back{background:none;border:none;color:var(--accent,var(--orange));font-size:14px;cursor:pointer;padding:0 0 8px;font-family:'Barlow',sans-serif;display:flex;align-items:center;gap:4px;}
.topbar h1{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;text-transform:uppercase;line-height:1;}
.topbar h2{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;text-transform:uppercase;}
.title-red{color:var(--orange);}
.greeting{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:4px;}
.home-header{display:flex;justify-content:space-between;align-items:flex-start;}
.streak-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-size:11px;color:var(--muted);text-align:right;line-height:1.5;max-width:150px;}
.streak-box strong{color:var(--text);font-size:12px;display:block;}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:3px;color:var(--dim);padding:24px 18px 8px;}
.group-card{display:flex;align-items:center;gap:14px;background:var(--surface);border-radius:14px;padding:18px 16px;border:none;border-left:4px solid var(--c,var(--orange));cursor:pointer;transition:transform .15s;flex:1;text-align:left;color:var(--text);}
.group-card:active{transform:scale(0.97);}
.group-row{display:flex;align-items:center;margin:0 10px 8px;gap:0;}
.group-icon{font-size:26px;width:44px;text-align:center;}
.group-info{flex:1;}
.group-name{font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;text-transform:uppercase;}
.group-count{font-size:12px;color:var(--muted);margin-top:2px;}
.group-arrow{font-size:22px;color:var(--c,var(--orange));font-weight:900;}
.group-del{background:var(--surface);border:none;border-left:1px solid var(--border);color:var(--muted);font-size:18px;cursor:pointer;padding:0 14px;align-self:stretch;display:flex;align-items:center;border-radius:0 14px 14px 0;}
.group-card.rounded-full{border-radius:14px;}
.recent-card{margin:0 10px;background:var(--surface);border-left:4px solid var(--c,var(--orange));border-radius:14px;padding:14px 16px;}
.recent-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.recent-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;}
.recent-date{font-size:11px;color:var(--muted);}
.recent-stats{display:flex;gap:14px;font-size:13px;color:var(--muted);}

/* EXERCISE CARDS WITH IMAGE */
.ex-list{padding:8px 10px 100px;}
.ex-item{background:var(--surface);border-radius:14px;margin-bottom:10px;border-left:3px solid var(--c,var(--orange));overflow:hidden;}
.ex-img-wrap{position:relative;width:100%;height:160px;background:var(--surface2);cursor:pointer;overflow:hidden;}
.ex-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.ex-img-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--dim);font-size:13px;}
.ex-img-placeholder span{font-size:32px;}
.ex-img-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.ex-img-wrap:active .ex-img-overlay{opacity:1;}
.ex-img-overlay-txt{color:#fff;font-size:13px;font-weight:600;background:rgba(0,0,0,.5);padding:6px 14px;border-radius:20px;}
.ex-body{padding:12px 14px;}
.ex-top{display:flex;align-items:flex-start;justify-content:space-between;}
.ex-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.ex-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;}
.ex-detail{font-size:12px;color:var(--muted);margin-top:2px;}
.ex-actions{display:flex;gap:6px;margin-top:10px;}
.btn-ex-img{flex:1;background:var(--surface2);border:1px dashed var(--border);border-radius:8px;padding:9px;color:var(--muted);font-size:12px;cursor:pointer;font-family:'Barlow',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn-ex-img.has-img{border-style:solid;color:var(--green);border-color:var(--green)22;}
.btn-ex-del{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--muted);font-size:15px;cursor:pointer;}
.fab-start{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 20px);max-width:460px;z-index:10;}
.fab-start::before{content:'';position:absolute;inset:-20px 0 0 0;background:linear-gradient(0deg,var(--bg) 60%,transparent);}
.btn-start{width:100%;position:relative;background:var(--c,var(--orange));color:#fff;border:none;border-radius:14px;padding:18px;font-family:'Barlow Condensed',sans-serif;font-size:21px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;transition:transform .15s;display:block;}
.btn-start:active{transform:scale(0.97);}

/* ADD TABS */
.add-tabs{display:flex;padding:16px 10px 0;gap:8px;}
.add-tab{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 10px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .2s;}
.add-tab.active{background:var(--surface2);border-color:var(--green);color:var(--green);}
.form-body{padding:16px 16px 100px;}
.form-group{margin-bottom:16px;}
.form-row{display:flex;gap:12px;}
.form-row .form-group{flex:1;}
.form-label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;}
.form-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:16px;font-family:'Barlow',sans-serif;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--green);}
select.form-input option{background:#141414;}
.btn-add{width:100%;background:var(--green);color:#000;border:none;border-radius:14px;padding:18px;font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-transform:uppercase;letter-spacing:2px;cursor:pointer;margin-top:8px;transition:transform .15s;}
.btn-add:active{transform:scale(0.97);}
.btn-add.orange{background:var(--orange);color:#fff;}
.emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:6px;}
.emoji-opt{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:10px 0;font-size:22px;cursor:pointer;text-align:center;transition:all .2s;}
.emoji-opt.selected{border-color:var(--green);background:var(--surface2);}
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:6px;}
.color-opt{height:40px;border-radius:10px;border:3px solid transparent;cursor:pointer;transition:all .2s;}
.color-opt.selected{border-color:#fff;transform:scale(1.05);}

/* WORKOUT */
.workout-header{padding:44px 16px 14px;background:var(--bg);position:sticky;top:0;z-index:5;border-bottom:1px solid var(--border);}
.wh-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.wh-title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:900;text-transform:uppercase;}
.btn-close{background:var(--surface2);border:none;color:var(--muted);width:34px;height:34px;border-radius:50%;font-size:16px;cursor:pointer;flex-shrink:0;}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:5px;}
.prog-fill{height:100%;border-radius:2px;transition:width .5s ease;}
.prog-text{font-size:11px;color:var(--dim);}
.wex-cards{padding:8px 10px;}
.wex-card{background:var(--surface);border-radius:14px;margin-bottom:10px;border:1px solid var(--border);overflow:hidden;transition:opacity .3s;}
.wex-card.done{opacity:.5;}
.wex-img{width:100%;height:140px;object-fit:cover;display:block;}
.wex-inner{padding:14px;}
.wex-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.wex-muscle{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:2px;}
.wex-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;}
.wex-note{font-size:12px;color:var(--dim);margin-top:2px;}
.done-badge{width:30px;height:30px;background:#0F2A1A;color:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0;}
.sets-row{display:flex;align-items:center;gap:7px;margin-bottom:11px;flex-wrap:wrap;}
.set-dot{width:11px;height:11px;border-radius:50%;border:2px solid var(--border);transition:all .2s;flex-shrink:0;}
.set-dot.filled{border:none;}
.sets-info{font-size:13px;color:var(--muted);margin-left:4px;}
.btn-set{flex:1;background:var(--c,var(--orange));color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:transform .1s;}
.btn-set:active{transform:scale(0.97);}
.btn-undo{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:10px;padding:13px 14px;font-size:16px;cursor:pointer;}
.act-row{display:flex;gap:8px;}
.timer-bar{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-top:2px solid var(--c,var(--orange));padding:10px 16px;z-index:20;display:flex;align-items:center;gap:10px;}
.timer-bar.hidden{display:none;}
.timer-label{font-size:12px;color:var(--muted);flex-shrink:0;}
.timer-val{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;flex:1;text-align:center;transition:color .3s;}
.timer-val.urgent{color:#FF2200;animation:blink .5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.4;}}
.timer-btns{display:flex;gap:6px;}
.btn-timer{background:var(--surface2);border:1px solid var(--border);color:#ccc;border-radius:8px;padding:6px 11px;font-size:12px;cursor:pointer;font-family:'Barlow',sans-serif;}
.finish-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:8px 10px 10px;background:var(--bg);border-top:1px solid var(--border);z-index:15;}
.btn-finish{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:14px;padding:16px;font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;transition:all .3s;}
.btn-finish.ready{background:#0F2A1A;border-color:var(--green);color:var(--green);}
.history-list{padding:8px 10px;}
.hist-card{background:var(--surface);border-left:4px solid var(--c,var(--muted));border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:7px;}
.hist-group{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;text-transform:uppercase;}
.hist-date{font-size:11px;color:var(--muted);text-align:right;line-height:1.4;max-width:130px;}
.hist-stats{display:flex;gap:14px;font-size:13px;color:var(--muted);margin-bottom:8px;}
.hist-tags{display:flex;flex-wrap:wrap;gap:5px;}
.hist-tag{background:var(--surface2);color:var(--muted);font-size:11px;padding:3px 8px;border-radius:6px;}
.empty{text-align:center;padding:80px 20px;color:var(--dim);}
.empty-ico{font-size:48px;margin-bottom:16px;}
.empty p{font-size:16px;line-height:1.6;}
.bottom-nav{display:flex;background:#0D0D0D;border-top:1px solid var(--border);flex-shrink:0;}
.nav-btn{flex:1;background:none;border:none;color:var(--dim);padding:10px 0 14px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-family:'Barlow',sans-serif;text-transform:uppercase;letter-spacing:.5px;transition:color .2s;}
.nav-btn.active{color:var(--orange);}
.nav-ico{font-size:21px;}
.nav-plus{width:32px;height:32px;background:var(--orange);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:300;line-height:1;}
.nav-btn.active .nav-plus{background:#FF6633;}
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-60px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:12px;font-size:14px;z-index:100;white-space:nowrap;opacity:0;transition:all .3s;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
.hint{font-size:12px;color:var(--dim);padding:0 0 8px;line-height:1.5;}
input[type=file]{display:none;}
</style>
</head>
<body>
<div id="app">
  <div id="view" class="view"></div>
  <div id="nav" class="bottom-nav">
    <button class="nav-btn active" id="nb-home" onclick="goHome()">
      <span class="nav-ico">🏠</span><span>Início</span>
    </button>
    <button class="nav-btn" id="nb-add" onclick="goAdd('exercise')">
      <div class="nav-plus">+</div><span>Adicionar</span>
    </button>
    <button class="nav-btn" id="nb-hist" onclick="goHist()">
      <span class="nav-ico">📋</span><span>Histórico</span>
    </button>
  </div>
  <div class="toast" id="toast"></div>
  <input type="file" id="img-input" accept="image/*"/>
</div>

<script>
const DEFAULT_GROUPS=[
  {id:'peito-bicep',name:'Peito e Bícep',icon:'💪',color:'#FF4500',custom:false,exercises:[
    {id:'supino-inclinado',name:'Supino Inclinado',sets:3,reps:12,muscle:'Peito',notes:'Banco a 45°',img:''},
    {id:'cruse-fixo',name:'Cruse Fixo',sets:3,reps:15,muscle:'Peito',notes:'',img:''},
    {id:'bicep-maquina',name:'Bícep na Máquina',sets:3,reps:12,muscle:'Bícep',notes:'',img:''},
    {id:'bicep-banco',name:'Bícep Banco Inclinado',sets:3,reps:12,muscle:'Bícep',notes:'',img:''},
    {id:'martelo',name:'Martelo c/ Alteres',sets:3,reps:12,muscle:'Bícep',notes:'Alternado',img:''},
  ]},
  {id:'costas-tricep',name:'Costas e Trícep',icon:'🏋️',color:'#00BFFF',custom:false,exercises:[
    {id:'remada',name:'Remada na Máquina',sets:3,reps:12,muscle:'Costas',notes:'',img:''},
    {id:'push-costas',name:'Push de Costas (Máquina)',sets:3,reps:12,muscle:'Costas',notes:'',img:''},
    {id:'tricep-frances',name:'Trícep Francês',sets:3,reps:12,muscle:'Trícep',notes:'',img:''},
    {id:'tricep-maquina',name:'Trícep na Máquina',sets:3,reps:12,muscle:'Trícep',notes:'',img:''},
    {id:'tricep-polia',name:'Trícep na Polia (Barra V)',sets:3,reps:15,muscle:'Trícep',notes:'',img:''},
    {id:'afundos',name:'Afundos Trícep Máquina',sets:3,reps:12,muscle:'Trícep',notes:'',img:''},
  ]},
  {id:'ombro-perna',name:'Ombro e Perna',icon:'🦵',color:'#FFD700',custom:false,exercises:[
    {id:'ombro-frontal',name:'Ombro Frontal c/ Halteres',sets:3,reps:12,muscle:'Ombro',notes:'',img:''},
    {id:'ombro-lateral',name:'Ombro Lateral c/ Halteres',sets:3,reps:12,muscle:'Ombro',notes:'',img:''},
    {id:'press-ombros',name:'Press Máquina (Ombros)',sets:3,reps:12,muscle:'Ombro',notes:'',img:''},
    {id:'elevacoes',name:'Elevações na Máquina',sets:3,reps:12,muscle:'Ombro',notes:'',img:''},
    {id:'cadeira-ext',name:'Cadeira Extensora',sets:3,reps:15,muscle:'Perna',notes:'',img:''},
    {id:'cadeira-abd',name:'Cadeira Abdutora',sets:3,reps:15,muscle:'Perna',notes:'',img:''},
    {id:'aducao',name:'Adução do Quadril',sets:3,reps:15,muscle:'Perna',notes:'',img:''},
    {id:'gemeos',name:'Gémeos na Máquina',sets:3,reps:15,muscle:'Perna',notes:'',img:''},
    {id:'bicicleta',name:'Bicicleta Ergométrica',sets:1,reps:20,muscle:'Cardio',notes:'20 min',img:''},
    {id:'abdominais',name:'Abdominais',sets:3,reps:20,muscle:'Abdómen',notes:'',img:''},
    {id:'passadeira',name:'Passadeira',sets:1,reps:1,muscle:'Cardio',notes:'15 min',img:''},
  ]},
];
const MUSCLES=['Peito','Costas','Bícep','Trícep','Ombro','Perna','Abdómen','Cardio','Glúteo','Outro'];
const EMOJIS=['🦵','💪','🏋️','🔥','⚡','🎯','🏃','🤸','🧘','🥊','🏆','💥','🦾','🫀','🎽'];
const COLORS=['#FF4500','#00BFFF','#FFD700','#00FF88','#FF69B4','#9B59B6','#FF6B35','#26DE81','#4ECDC4','#FF3366'];

let groups=JSON.parse(localStorage.getItem('gymrui-groups')||'null')||DEFAULT_GROUPS;
let history=JSON.parse(localStorage.getItem('gymrui-history')||'[]');
let workout=null;
let timer={id:null,secs:90,running:false,visible:false};
let curView='home';
let addMode='exercise';
let selEmoji=EMOJIS[0];
let selColor=COLORS[3];
let pendingImgCb=null;

function save(){localStorage.setItem('gymrui-groups',JSON.stringify(groups));}
function saveHist(){localStorage.setItem('gymrui-history',JSON.stringify(history));}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function setNav(v){['home','add','hist'].forEach(n=>document.getElementById('nb-'+n).classList.toggle('active',n===v));}
function goHome(){curView='home';setNav('home');showNav();renderHome();}
function goAdd(m){curView='add';addMode=m||'exercise';selEmoji=EMOJIS[0];selColor=COLORS[3];setNav('add');showNav();renderAdd();}
function goHist(){curView='hist';setNav('hist');showNav();renderHist();}
function goGroup(id){curView='group';showNav();renderGroup(id);}
function showNav(){document.getElementById('nav').style.display='flex';}
function hideNav(){document.getElementById('nav').style.display='none';}

/* ── IMAGE HANDLING ── */
document.getElementById('img-input').addEventListener('change',function(){
  const file=this.files[0];
  if(!file||!pendingImgCb)return;
  this.value='';
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const MAX=600;
      const ratio=Math.min(MAX/img.width,MAX/img.height,1);
      const w=Math.round(img.width*ratio);
      const h=Math.round(img.height*ratio);
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const data=canvas.toDataURL('image/jpeg',0.75);
      pendingImgCb(data);
      pendingImgCb=null;
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
});

function pickImage(cb){
  pendingImgCb=cb;
  document.getElementById('img-input').click();
}

function setExImage(gid,eid){
  pickImage(data=>{
    groups=groups.map(g=>g.id===gid?{...g,exercises:g.exercises.map(e=>e.id===eid?{...e,img:data}:e)}:g);
    save();showToast('📷 Imagem guardada!');renderGroup(gid);
  });
}

function removeExImage(gid,eid){
  groups=groups.map(g=>g.id===gid?{...g,exercises:g.exercises.map(e=>e.id===eid?{...e,img:''}:e)}:g);
  save();showToast('🗑️ Imagem removida');renderGroup(gid);
}

/* ── HOME ── */
function renderHome(){
  const last=history[0];
  document.getElementById('view').innerHTML=`
    <div class="topbar">
      <div class="home-header">
        <div><p class="greeting">Bem-vindo,</p><h1>GymRui <span class="title-red">Pro</span></h1></div>
        ${last?`<div class="streak-box">🔥 Último:<br/><strong>${last.groupName}</strong><span style="font-size:10px;color:var(--dim)">${last.date}</span></div>`:''}
      </div>
    </div>
    <p class="section-label">Os Teus Treinos</p>
    ${groups.map(g=>`
      <div class="group-row">
        <button class="group-card" style="--c:${g.color};border-radius:${g.custom?'14px 0 0 14px':'14px'}" onclick="goGroup('${g.id}')">
          <span class="group-icon">${g.icon}</span>
          <div class="group-info">
            <div class="group-name">${g.name}</div>
            <div class="group-count">${g.exercises.length} exercícios${g.custom?' · personalizado':''}</div>
          </div>
          <span class="group-arrow">›</span>
        </button>
        ${g.custom?`<button class="group-del" onclick="delGroup('${g.id}')">🗑</button>`:''}
      </div>`).join('')}
    <div style="padding:0 10px 8px">
      <button onclick="goAdd('group')" style="width:100%;background:transparent;border:2px dashed var(--border);border-radius:14px;padding:16px;color:var(--dim);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">
        <span style="font-size:22px">+</span> Criar Novo Grupo
      </button>
    </div>
    ${last?`<p class="section-label">Treino Recente</p>
    <div class="recent-card" style="--c:${last.groupColor||'#888'}">
      <div class="recent-row"><span class="recent-name">${last.groupName}</span><span class="recent-date">${last.date}</span></div>
      <div class="recent-stats"><span>⏱ ${last.duration} min</span><span>✅ ${last.done}/${last.total}</span></div>
    </div>`:''}
    <div style="height:16px"></div>`;
}

function delGroup(id){
  const g=groups.find(x=>x.id===id);
  if(!g?.custom)return;
  if(!confirm(`Apagar "${g.name}"? Os exercícios também serão apagados.`))return;
  groups=groups.filter(x=>x.id!==id);save();showToast('🗑️ Grupo apagado');renderHome();
}

/* ── GROUP VIEW ── */
function renderGroup(id){
  const g=groups.find(x=>x.id===id);
  document.getElementById('view').innerHTML=`
    <div class="topbar" style="--accent:${g.color}">
      <button class="topbar-back" onclick="goHome()">← Voltar</button>
      <h2>${g.icon} ${g.name}</h2>
    </div>
    ${g.exercises.length===0?`<div class="empty"><div class="empty-ico">🏋️</div><p>Ainda não tens exercícios.<br/>Usa o "+" para adicionar!</p></div>`:''}
    <div class="ex-list">
      ${g.exercises.map(ex=>`
        <div class="ex-item" style="--c:${g.color}">
          <div class="ex-img-wrap" onclick="setExImage('${g.id}','${ex.id}')">
            ${ex.img
              ?`<img src="${ex.img}" alt="${ex.name}"/>
                <div class="ex-img-overlay"><span class="ex-img-overlay-txt">📷 Alterar foto</span></div>`
              :`<div class="ex-img-placeholder"><span>📷</span><span>Toca para adicionar foto</span></div>`}
          </div>
          <div class="ex-body">
            <div class="ex-top">
              <div>
                <span class="ex-tag" style="background:${g.color}22;color:${g.color}">${ex.muscle}</span>
                <div class="ex-name">${ex.name}</div>
                <div class="ex-detail">${ex.sets} séries × ${ex.reps} reps${ex.notes?' · '+ex.notes:''}</div>
              </div>
            </div>
            <div class="ex-actions">
              <button class="btn-ex-img${ex.img?' has-img':''}" onclick="setExImage('${g.id}','${ex.id}')">
                ${ex.img?'✅ Foto adicionada':'📷 Adicionar foto'}
              </button>
              ${ex.img?`<button class="btn-ex-del" onclick="removeExImage('${g.id}','${ex.id}')">🗑</button>`:''}
              ${(ex.custom||g.custom)?`<button class="btn-ex-del" onclick="delEx('${g.id}','${ex.id}')">✕</button>`:''}
            </div>
          </div>
        </div>`).join('')}
    </div>
    ${g.exercises.length>0?`<div class="fab-start">
      <button class="btn-start" style="--c:${g.color}" onclick="goWorkout('${g.id}')">▶ Iniciar Treino</button>
    </div>`:''}`;
}

function delEx(gid,eid){
  groups=groups.map(g=>g.id===gid?{...g,exercises:g.exercises.filter(e=>e.id!==eid)}:g);
  save();showToast('✕ Exercício removido');renderGroup(gid);
}

/* ── ADD VIEW ── */
function renderAdd(){
  document.getElementById('view').innerHTML=`
    <div class="topbar" style="--accent:var(--green)">
      <h2>➕ ${addMode==='group'?'Novo Grupo':'Novo Exercício'}</h2>
    </div>
    <div class="add-tabs">
      <button class="add-tab ${addMode==='exercise'?'active':''}" onclick="switchAddMode('exercise')">💪 Exercício</button>
      <button class="add-tab ${addMode==='group'?'active':''}" onclick="switchAddMode('group')">📁 Grupo</button>
    </div>
    <div class="form-body">${addMode==='exercise'?renderExForm():renderGroupForm()}</div>`;
}

function switchAddMode(m){addMode=m;renderAdd();}

function renderExForm(){return `
  <p class="hint">Adiciona um exercício a qualquer grupo de treino.</p>
  <div class="form-group"><label class="form-label">Nome do Exercício *</label>
    <input id="f-name" class="form-input" placeholder="ex: Agachamento com Barra"/></div>
  <div class="form-group"><label class="form-label">Grupo de Treino</label>
    <select id="f-group" class="form-input">${groups.map(g=>`<option value="${g.id}">${g.icon} ${g.name}</option>`).join('')}</select></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">Séries</label>
      <input id="f-sets" class="form-input" type="number" min="1" max="10" value="3"/></div>
    <div class="form-group"><label class="form-label">Repetições</label>
      <input id="f-reps" class="form-input" type="number" min="1" max="100" value="12"/></div>
  </div>
  <div class="form-group"><label class="form-label">Músculo Principal</label>
    <select id="f-muscle" class="form-input">${MUSCLES.map(m=>`<option>${m}</option>`).join('')}</select></div>
  <div class="form-group"><label class="form-label">Notas (opcional)</label>
    <input id="f-notes" class="form-input" placeholder="ex: Uni-articular, Cabo..."/></div>
  <button class="btn-add" onclick="submitEx()">Adicionar Exercício</button>`;}

function renderGroupForm(){return `
  <p class="hint">Cria um treino novo. Depois adiciona os exercícios e as fotos.</p>
  <div class="form-group"><label class="form-label">Nome do Grupo *</label>
    <input id="g-name" class="form-input" placeholder="ex: Treino de Pernas"/></div>
  <div class="form-group"><label class="form-label">Escolhe um Ícone</label>
    <div class="emoji-grid">${EMOJIS.map(e=>`<button class="emoji-opt${e===selEmoji?' selected':''}" onclick="pickEmoji(this,'${e}')">${e}</button>`).join('')}</div></div>
  <div class="form-group"><label class="form-label">Escolhe uma Cor</label>
    <div class="color-grid">${COLORS.map(c=>`<div class="color-opt${c===selColor?' selected':''}" style="background:${c}" onclick="pickColor(this,'${c}')"></div>`).join('')}</div></div>
  <button class="btn-add orange" onclick="submitGroup()" style="margin-top:16px">Criar Grupo</button>`;}

function pickEmoji(el,e){selEmoji=e;document.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');}
function pickColor(el,c){selColor=c;document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('selected'));el.classList.add('selected');}

function submitEx(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){showToast('⚠️ Escreve o nome');return;}
  const gid=document.getElementById('f-group').value;
  const newEx={id:'custom-'+Date.now(),name,sets:parseInt(document.getElementById('f-sets').value)||3,
    reps:parseInt(document.getElementById('f-reps').value)||12,
    muscle:document.getElementById('f-muscle').value,
    notes:document.getElementById('f-notes').value.trim(),custom:true,img:''};
  groups=groups.map(g=>g.id===gid?{...g,exercises:[...g.exercises,newEx]}:g);
  save();showToast('✅ Exercício adicionado!');goHome();
}

function submitGroup(){
  const name=document.getElementById('g-name').value.trim();
  if(!name){showToast('⚠️ Escreve o nome do grupo');return;}
  const ng={id:'group-'+Date.now(),name,icon:selEmoji,color:selColor,custom:true,exercises:[]};
  groups=[...groups,ng];save();showToast('✅ Grupo "'+name+'" criado!');goGroup(ng.id);
}

/* ── WORKOUT ── */
function goWorkout(id){
  const g=groups.find(x=>x.id===id);
  if(!g||g.exercises.length===0){showToast('⚠️ Adiciona exercícios primeiro!');return;}
  workout={groupId:id,groupName:g.name,groupColor:g.color,startTime:Date.now(),
    exercises:g.exercises.map(e=>({...e,setsCompleted:0}))};
  curView='workout';hideNav();renderWorkout();
}

function renderWorkout(){
  const w=workout;
  const total=w.exercises.length;
  const done=w.exercises.filter(e=>e.setsCompleted>=e.sets).length;
  const prog=total>0?done/total:0;
  const allDone=done===total;
  document.getElementById('view').innerHTML=`
    <div class="workout-header">
      <div class="wh-row">
        <div class="wh-title">${w.groupName}</div>
        <button class="btn-close" onclick="cancelWorkout()">✕</button>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${prog*100}%;background:${w.groupColor}"></div></div>
      <div class="prog-text">${done}/${total} exercícios completos</div>
    </div>
    <div class="wex-cards" id="wex-cards" style="padding-bottom:${timer.visible?'150px':'80px'}">
      ${w.exercises.map(ex=>{
        const isDone=ex.setsCompleted>=ex.sets;
        return `<div class="wex-card${isDone?' done':''}">
          ${ex.img?`<img class="wex-img" src="${ex.img}" alt="${ex.name}"/>`:''}
          <div class="wex-inner">
            <div class="wex-top">
              <div>
                <span class="wex-muscle">${ex.muscle}</span>
                <div class="wex-name">${ex.name}</div>
                ${ex.notes?`<div class="wex-note">${ex.notes}</div>`:''}
              </div>
              ${isDone?`<div class="done-badge">✓</div>`:''}
            </div>
            <div class="sets-row">
              ${Array.from({length:ex.sets},(_,i)=>`<div class="set-dot${i<ex.setsCompleted?' filled':''}" style="${i<ex.setsCompleted?'background:'+w.groupColor:''}"></div>`).join('')}
              <span class="sets-info">${ex.setsCompleted}/${ex.sets} × ${ex.reps} reps</span>
            </div>
            ${!isDone?`<div class="act-row">
              <button class="btn-set" style="--c:${w.groupColor}" onclick="completeSet('${ex.id}')">+ Série Concluída</button>
              ${ex.setsCompleted>0?`<button class="btn-undo" onclick="undoSet('${ex.id}')">↩</button>`:''}
            </div>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
    <div class="timer-bar${timer.visible?'':' hidden'}" id="timer-bar" style="--c:${w.groupColor}">
      <span class="timer-label">⏱ Descanso</span>
      <span class="timer-val${timer.secs<=10?' urgent':''}" id="timer-display">${fmtTime(timer.secs)}</span>
      <div class="timer-btns">
        <button class="btn-timer" onclick="addTimerTime()">+30s</button>
        <button class="btn-timer" onclick="skipTimer()">Skip</button>
      </div>
    </div>
    <div class="finish-bar">
      <button class="btn-finish${allDone?' ready':''}" onclick="finishWorkout()">
        ${allDone?'🏆 Concluir Treino':'Terminar Treino'}
      </button>
    </div>`;
}

function fmtTime(s){return Math.floor(s/60)+':'+(s%60+'').padStart(2,'0');}
function startTimer(secs){
  if(timer.id)clearInterval(timer.id);
  timer={...timer,secs,running:true,visible:true};
  timer.id=setInterval(()=>{timer.secs--;if(timer.secs<=0){clearInterval(timer.id);timer.running=false;showToast('⏰ Descanso terminado!');}updateTimerDisplay();},1000);
  updateTimerDisplay();
}
function updateTimerDisplay(){
  const el=document.getElementById('timer-display');if(!el)return;
  el.textContent=fmtTime(timer.secs);
  el.className='timer-val'+(timer.secs<=10?' urgent':'');
  const bar=document.getElementById('timer-bar');if(bar)bar.classList.toggle('hidden',!timer.visible);
  const cards=document.getElementById('wex-cards');if(cards)cards.style.paddingBottom=timer.visible?'150px':'80px';
}
function addTimerTime(){timer.secs+=30;updateTimerDisplay();}
function skipTimer(){clearInterval(timer.id);timer.running=false;timer.visible=false;updateTimerDisplay();}
function completeSet(eid){workout.exercises=workout.exercises.map(e=>e.id===eid?{...e,setsCompleted:Math.min(e.setsCompleted+1,e.sets)}:e);startTimer(90);renderWorkout();}
function undoSet(eid){workout.exercises=workout.exercises.map(e=>e.id===eid?{...e,setsCompleted:Math.max(e.setsCompleted-1,0)}:e);renderWorkout();}
function finishWorkout(){
  const dur=Math.round((Date.now()-workout.startTime)/60000);
  const done=workout.exercises.filter(e=>e.setsCompleted>=e.sets);
  history.unshift({id:Date.now(),date:new Date().toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short'}),
    groupName:workout.groupName,groupColor:workout.groupColor,duration:dur,
    total:workout.exercises.length,done:done.length,exercises:done.map(e=>e.name)});
  if(history.length>100)history=history.slice(0,100);
  saveHist();if(timer.id)clearInterval(timer.id);
  timer={id:null,secs:90,running:false,visible:false};workout=null;showNav();
  showToast('🏆 Treino guardado!');goHome();
}
function cancelWorkout(){
  if(!confirm('Cancelar o treino?'))return;
  if(timer.id)clearInterval(timer.id);
  timer={id:null,secs:90,running:false,visible:false};workout=null;showNav();goHome();
}

/* ── HISTORY ── */
function renderHist(){
  document.getElementById('view').innerHTML=`
    <div class="topbar" style="--accent:#888"><h2>📋 Histórico de Treinos</h2></div>
    ${history.length===0?`<div class="empty"><div class="empty-ico">🏋️</div><p>Ainda não fizeste nenhum treino.<br/>Começa já!</p></div>`
    :`<div class="history-list">${history.map(h=>`
      <div class="hist-card" style="--c:${h.groupColor||'#888'}">
        <div class="hist-top"><span class="hist-group">${h.groupName}</span><span class="hist-date">${h.date}</span></div>
        <div class="hist-stats"><span>⏱ ${h.duration} min</span><span>✅ ${h.done}/${h.total}</span></div>
        ${h.exercises.length>0?`<div class="hist-tags">${h.exercises.slice(0,4).map(n=>`<span class="hist-tag">${n}</span>`).join('')}${h.exercises.length>4?`<span class="hist-tag">+${h.exercises.length-4}</span>`:''}</div>`:''}
      </div>`).join('')}</div>`}`;
}

goHome();
</script>
<script>
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("./sw.js")
    .then(()=>console.log("GymRui offline pronto!"))
    .catch(e=>console.log("SW erro:",e));
}
</script>
</body>
</html>
